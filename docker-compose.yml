services:
  postgres:
    image: postgres:16-alpine
    container_name: schoolbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: schoolbridge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schoolbridge"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  schoolbridge-bot:
    build: .
    container_name: schoolbridge-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/schoolbridge
    volumes:
      - ./logs:/app/logs
    command: >
      sh -c "alembic upgrade head && python main.py"

volumes:
  pgdata:
    driver: local
